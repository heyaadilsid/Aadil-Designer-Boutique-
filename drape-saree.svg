<svg viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Saree drape silhouette sketch">
  <defs>
    <linearGradient id="sarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A24B" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0E2E24" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- fitted underskirt column -->
  <path d="M78 60 C 65 140, 62 210, 66 264 L 150 264 C 152 210, 148 140, 138 60 Z"
        fill="url(#sarGrad)" stroke="#C9A24B" stroke-width="1.1"/>
  <!-- diagonal pallu drape -->
  <path d="M60 40 C 110 70, 150 110, 170 200 C 178 225, 182 245, 178 265"
        fill="none" stroke="#6E1423" stroke-width="1.4"/>
  <path d="M60 40 C 108 66, 145 100, 163 185" fill="none" stroke="#C9A24B" stroke-width="0.6" opacity="0.8"/>
  <!-- pallu pleat fan at shoulder -->
  <path d="M52 30 L 60 40 L 46 46 Z" fill="#C9A24B" opacity="0.5"/>
  <path d="M58 26 L 66 38 L 52 42 Z" fill="#C9A24B" opacity="0.5"/>
  <path d="M64 24 L 72 36 L 58 40 Z" fill="#C9A24B" opacity="0.5"/>
  <!-- skirt pleats -->
  <path d="M88 65 C 82 140, 80 200, 82 262" fill="none" stroke="#C9A24B" stroke-width="0.5" opacity="0.6"/>
  <path d="M104 63 C 102 140, 101 200, 102 263" fill="none" stroke="#C9A24B" stroke-width="0.5" opacity="0.6"/>
  <path d="M120 63 C 122 140, 123 200, 122 263" fill="none" stroke="#C9A24B" stroke-width="0.5" opacity="0.6"/>
  <!-- border embellishment on pallu -->
  <g fill="#C9A24B" opacity="0.85">
    <circle cx="176" cy="210" r="1.6"/><circle cx="180" cy="228" r="1.6"/><circle cx="180" cy="246" r="1.6"/>
  </g>
  <!-- hem border -->
  <path d="M66 264 L 150 264" stroke="#6E1423" stroke-width="2"/>
</svg>
