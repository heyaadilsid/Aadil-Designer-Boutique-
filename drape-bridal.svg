<svg viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bridal lehenga silhouette sketch">
  <defs>
    <linearGradient id="lehGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A24B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6E1423" stop-opacity="0.12"/>
    </linearGradient>
  </defs>
  <!-- fitted bodice -->
  <path d="M85 20 C 85 12, 135 12, 135 20 L 140 78 L 80 78 Z" fill="url(#lehGrad)" stroke="#C9A24B" stroke-width="1.2"/>
  <!-- flared skirt -->
  <path d="M78 80 C 40 150, 15 220, 10 264 C 70 274, 150 274, 210 264 C 205 220, 180 150, 142 80 Z"
        fill="url(#lehGrad)" stroke="#C9A24B" stroke-width="1.2"/>
  <!-- skirt pleat lines -->
  <path d="M95 90 C 75 160, 60 220, 55 260" fill="none" stroke="#C9A24B" stroke-width="0.5" opacity="0.7"/>
  <path d="M110 88 C 105 160, 102 220, 100 262" fill="none" stroke="#C9A24B" stroke-width="0.5" opacity="0.7"/>
  <path d="M125 88 C 135 160, 140 220, 142 262" fill="none" stroke="#C9A24B" stroke-width="0.5" opacity="0.7"/>
  <path d="M140 90 C 158 160, 172 220, 178 260" fill="none" stroke="#C9A24B" stroke-width="0.5" opacity="0.7"/>
  <!-- dupatta drape -->
  <path d="M132 22 C 175 40, 200 90, 190 150 C 185 130, 165 95, 128 60" fill="none" stroke="#6E1423" stroke-width="1.4"/>
  <!-- embroidery dots along hem -->
  <g fill="#C9A24B">
    <circle cx="30" cy="258" r="1.6"/><circle cx="50" cy="266" r="1.6"/><circle cx="72" cy="270" r="1.6"/>
    <circle cx="98" cy="272" r="1.6"/><circle cx="124" cy="271" r="1.6"/><circle cx="150" cy="268" r="1.6"/>
    <circle cx="172" cy="262" r="1.6"/><circle cx="190" cy="256" r="1.6"/>
  </g>
  <!-- neckline embellishment -->
  <path d="M97 22 C 105 30, 115 30, 123 22" fill="none" stroke="#6E1423" stroke-width="1"/>
</svg>
