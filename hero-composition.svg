<svg viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bridal and groom couture silhouettes joined by a gold thread">
  <defs>
    <linearGradient id="heroGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D48A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#9C7A2F" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#C9A24B" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A24B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="300" cy="180" rx="280" ry="200" fill="url(#glow)"/>

  <!-- bride silhouette (left) -->
  <g transform="translate(120,40) scale(1.05)">
    <path d="M55 10 C 55 3, 85 3, 85 10 L 90 55 L 50 55 Z" fill="none" stroke="url(#heroGoldGrad)" stroke-width="1.3"/>
    <path d="M48 57 C 20 110, 5 165, 0 220 C 45 232, 95 232, 140 220 C 135 165, 120 110, 92 57 Z"
          fill="none" stroke="url(#heroGoldGrad)" stroke-width="1.3"/>
    <path d="M62 65 C 45 120, 35 170, 32 216" fill="none" stroke="url(#heroGoldGrad)" stroke-width="0.4" opacity="0.7"/>
    <path d="M75 63 C 70 120, 68 170, 67 218" fill="none" stroke="url(#heroGoldGrad)" stroke-width="0.4" opacity="0.7"/>
    <path d="M88 65 C 100 120, 108 170, 112 216" fill="none" stroke="url(#heroGoldGrad)" stroke-width="0.4" opacity="0.7"/>
    <path d="M84 12 C 120 26, 140 65, 132 108 C 126 92, 110 65, 82 44" fill="none" stroke="#D8B4A0" stroke-width="1.2" opacity="0.85"/>
  </g>

  <!-- groom silhouette (right) -->
  <g transform="translate(340,55) scale(1.05)">
    <path d="M40 12 C 40 6, 70 6, 70 12 L 66 20 L 44 20 Z" fill="none" stroke="url(#heroGoldGrad)" stroke-width="1.3"/>
    <path d="M30 20 L 80 20 L 92 150 C 94 172, 88 195, 82 200 L 28 200 C 22 195, 16 172, 18 150 Z"
          fill="none" stroke="url(#heroGoldGrad)" stroke-width="1.3"/>
    <line x1="55" y1="22" x2="55" y2="198" stroke="url(#heroGoldGrad)" stroke-width="0.5" opacity="0.8"/>
    <g fill="url(#heroGoldGrad)" opacity="0.9">
      <circle cx="55" cy="40" r="1.6"/><circle cx="55" cy="62" r="1.6"/><circle cx="55" cy="84" r="1.6"/>
      <circle cx="55" cy="106" r="1.6"/><circle cx="55" cy="128" r="1.6"/>
    </g>
  </g>

  <!-- connecting gold thread -->
  <path d="M225 190 C 280 230, 320 230, 375 195" fill="none" stroke="url(#heroGoldGrad)" stroke-width="1.4" stroke-dasharray="2 5" opacity="0.9"/>
  <g transform="translate(297,222) rotate(8)">
    <rect x="0" y="0" width="3.4" height="20" rx="1.7" fill="url(#heroGoldGrad)"/>
    <ellipse cx="1.7" cy="2.4" rx="2.6" ry="2" fill="none" stroke="url(#heroGoldGrad)" stroke-width="0.7"/>
  </g>
</svg>
